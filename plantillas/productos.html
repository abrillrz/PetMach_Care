<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetShop - Productos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-pink-100">
    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-center h-16">

                <div>
                    <h1 class="text-2xl font-bold text-pink-800">
                        PetMach Care
                </div>

                <div class="hidden md:flex gap-8">
                    <a href="/" class="hover:text-pink-800">Inicio</a>
                    <a href="/servicios" class="hover:text-pink-800">Servicios</a>
                </div>

                <div class="flex gap-4">

                    <button class="px-4 py-2 bg-pink-800 text-white rounded-lg">
                        Carrito (0)
                    </button>
                </div>

            </div>
        </div>
    </nav>

    <section class="max-w-7xl mx-auto px-6 py-16">

        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-gray-800">
                Productos
            </h1>

            <p class="text-gray-600 mt-3">
                Productos disponibles para el cuidado de tus mascotas
            </p>
        </div>

        <div class="grid md:grid-cols-3 gap-8">

            {% for producto in productos %}

            <div class="bg-white rounded-xl overflow-hidden shadow-xl transition-transform duration-500 ease-out transform hover:scale-105 cursor-pointer">
          
                 <div class="flex justify-center pt-6 bg-pink-200 pb-6">
                    <img
                    src="{{ producto.imagenUrl }}"
                    alt="{{ producto.nombreServicio }}"
                    class="h-56 object-center rounded-2xl"
                    >
                 </div>
                <div class="p-6">

                    <h3 class="text-2xl font-bold mb-3">
                        {{ producto.nombre }}
                    </h3>

                    <p class="text-gray-600 mb-5">
                        {{ producto.descripcion }}
                    </p>

                    <p class="text-pink-800 font-bold text-xl mb-5">
                        ${{ producto.precio }}
                    </p>

                    <button class="bg-pink-800 text-white px-5 py-2 rounded-lg">
                        Agregar al carrito
                    </button>
                </div>
            </div>

            {% endfor %}

        </div>

    </section>
</body>

</html>
