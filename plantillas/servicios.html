<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetShop - Productos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">
    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-center h-16">

                <div>
                    <h1 class="text-2xl font-bold text-emerald-600">
                        PetMach Care
                    </h1>
                </div>

                <div class="hidden md:flex gap-8">
                    <a href="/" class="hover:text-emerald-600">Inicio</a>
                    <a href="/productos" class="hover:text-emerald-600">Productos</a>
                </div>
                  <div class="flex gap-4">

                    <button class="px-4 py-2 bg-emerald-600 text-white rounded-lg">
                        Cart (0)
                    </button>
                </div>

            </div>
        </div>
    </nav>

    <section class="max-w-7xl mx-auto px-6 py-16">

        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-gray-800">
                Productos
            </h1>

            <p class="text-gray-600 mt-3">
                Productos disponibles para el cuidado de tus mascotas.
            </p>
        </div>

        <div class="grid md:grid-cols-3 gap-8">

            {% for servicio in servicios %}

            <div class="bg-white rounded-xl overflow-hidden shadow-lg">
                <img
                    src="{{ servicio.imagenUrl }}"
                    alt="{{ servicio.nombre }}"
                    class="h-56 w-full object-cover"
                >

                <div class="p-6">
                    <span class="inline-block bg-emerald-100 text-emerald-700 text-sm px-3 py-1 rounded-full mb-3">
                        {{ servicio.categoria }}
                    </span>

                    <h3 class="text-2xl font-bold mb-3">
                        {{ servicio.nombre }}
                    </h3>

                    <p class="text-gray-600 mb-5">
                        {{ servicio.descripcion }}
                    </p>

                    <p class="text-emerald-600 font-bold text-xl mb-5">
                        ${{ servicio.precio }}
                    </p>

                    <button class="bg-emerald-600 text-white px-5 py-2 rounded-lg">
                        Agregar al carrito
                    </button>
                </div>
            </div>

            {% endfor %}

        </div>

    </section>
</body>

</html>
